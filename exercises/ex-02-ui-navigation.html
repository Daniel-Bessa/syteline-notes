<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercises — 02 UI Navigation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #1a1a1a; color: #e2e8f0; min-height: 100vh; }

    /* ── Header ── */
    .hdr { background: #0f172a; padding: 18px 28px; display: flex;
           align-items: center; gap: 14px; border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 10; }
    .hdr-icon { font-size: 28px; }
    .hdr-title { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    .hdr-sub { font-size: 12px; color: #64748b; margin-top: 2px; }
    .hdr-right { margin-left: auto; text-align: right; }
    .hdr-home { color: #60a5fa; text-decoration: none; font-size: 13px; }
    .hdr-home:hover { text-decoration: underline; }

    /* ── Progress bar ── */
    .prog-wrap { background: #0f172a; padding: 10px 28px; border-bottom: 1px solid #1e293b; }
    .prog-label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .prog-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); border-radius: 3px;
                 transition: width 0.4s ease; }

    /* ── Layout ── */
    .page { max-width: 860px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── Lesson section ── */
    .lesson { margin-bottom: 8px; }
    .lesson-btn { width: 100%; text-align: left; background: #2d2d2d;
                  border: none; border-radius: 10px; padding: 14px 18px;
                  cursor: pointer; display: flex; align-items: center; gap: 12px;
                  color: #e2e8f0; font-size: 15px; font-weight: 600; transition: background .15s; }
    .lesson-btn:hover { background: #374151; }
    .lesson-btn .l-badge { background: #1e3a5f; color: #60a5fa; font-size: 11px;
                           font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .lesson-btn .l-check { margin-left: auto; font-size: 12px; color: #64748b; }
    .lesson-btn .l-caret { color: #64748b; font-size: 12px; transition: transform .2s; }
    .lesson-btn.open .l-caret { transform: rotate(90deg); }
    .lesson-body { display: none; padding: 6px 0 10px; }
    .lesson-body.open { display: block; }

    /* ── Exercise card ── */
    .ex-card { background: #242424; border-radius: 10px; margin-bottom: 10px;
               border: 1px solid #2d2d2d; overflow: hidden; }
    .ex-head { padding: 14px 18px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
    .ex-head:hover { background: #2d2d2d; }
    .ex-num { background: #1e3a5f; color: #60a5fa; font-size: 11px; font-weight: 700;
              padding: 3px 9px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
    .ex-title { font-size: 14px; font-weight: 600; color: #f1f5f9; flex: 1; }
    .ex-meta { font-size: 12px; color: #64748b; margin-top: 3px; }
    .ex-progress { margin-left: auto; flex-shrink: 0; text-align: right; }
    .ex-pct { font-size: 12px; font-weight: 700; color: #60a5fa; }
    .ex-done-badge { font-size: 11px; color: #86efac; display: none; }
    .ex-head.done .ex-pct { display: none; }
    .ex-head.done .ex-done-badge { display: block; }

    .ex-body { display: none; padding: 0 18px 18px; border-top: 1px solid #2d2d2d; }
    .ex-body.open { display: block; }

    .ex-goal { background: #1e293b; border-left: 3px solid #0284c7; color: #7dd3fc;
               padding: 10px 14px; border-radius: 0 6px 6px 0; font-size: 13px; line-height: 1.6;
               margin: 14px 0 16px; }

    /* ── Parts & Steps ── */
    .part-title { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase;
                  letter-spacing: .06em; margin: 16px 0 8px; }
    .step-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .step-item { display: flex; align-items: flex-start; gap: 10px; cursor: pointer;
                 padding: 8px 10px; border-radius: 7px; transition: background .12s; }
    .step-item:hover { background: #2d2d2d; }
    .step-cb { width: 18px; height: 18px; border: 2px solid #374151; border-radius: 4px;
               flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
               transition: all .15s; cursor: pointer; }
    .step-item.checked .step-cb { background: #16a34a; border-color: #16a34a; }
    .step-item.checked .step-cb::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }
    .step-text { font-size: 13px; color: #cbd5e1; line-height: 1.55; flex: 1; }
    .step-item.checked .step-text { color: #4b5563; text-decoration: line-through; }
    .step-note { font-size: 11.5px; color: #475569; font-style: italic; margin-top: 3px; display: block; }

    /* ── Controls ── */
    .ex-controls { display: flex; gap: 8px; margin-top: 16px; padding-top: 14px; border-top: 1px solid #2d2d2d; }
    .btn { padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 12px;
           font-weight: 600; transition: background .15s; }
    .btn-reset { background: #374151; color: #94a3b8; }
    .btn-reset:hover { background: #4b5563; }
    .btn-all { background: #1e3a5f; color: #60a5fa; }
    .btn-all:hover { background: #1d4ed8; color: #fff; }
  </style>
</head>

<script>
const KEY = 'ex-02-nav';

const LESSONS = [
  {

            { text: 'Click <b>Window › Close All</b> to close all forms.' },

      {

            { text: 'Repeat: add the <b>Vendors</b> form as a shortcut.' },

        ]

      {

        goal: 'Add the Items, Purchase Orders, and Order Shipping forms to the AutoRun folder so they open automatically on login.',
        parts: [

  {
    id: 'L2', label: 'Lesson 2', title: 'Finding and Displaying Records',
    exercises: [
      {
        id: '2.1', title: 'Use filter-in-place functionality',
        goal: 'Filter the Items form for all purchased items (gets more rows twice), then add Cost Type and U/M criteria to narrow the results.',
        parts: [
          { title: 'Steps', steps: [
            { text: 'Open the <b>Items</b> form.' },
            { text: 'Select <b>Purchased</b> from the Source drop-down list.' },
            { text: 'Click the <b>Filter</b> icon. Scroll to the bottom — 200 records.' },
            { text: 'Click <b>Get More Rows</b>. Scroll — now 400 records.' },
            { text: 'Click <b>Get More Rows</b> again. Scroll — now 553 records.' },
            { text: 'Press <b>F4</b> to re-enter filter mode (Purchased is still selected).' },
            { text: 'Select <b>Standard</b> from the Cost Type drop-down list. Press F4 to run. Scroll — now 60 records.' },
            { text: 'Click <b>Actions › Filter › Begin in place</b>. Select <b>EA-Each</b> from the U/M drop-down list.' },
            { text: 'Click <b>Actions › Filter › Execute in place</b>. Scroll — now 44 records.' },
            { text: 'Run Filter In Place, then press <b>F5</b> to clear all filter criteria.' },
            { text: 'Close the Items form.' },
          ]},
        ]
      },
      {
        id: '2.2a', title: 'Use search operators and special values',
        goal: 'Use wildcard (*) and comparison operator (>) in filter-in-place on the Purchase Order Lines form.',
        parts: [
          { title: 'Steps', steps: [
            { text: 'Open the <b>Purchase Order Lines</b> form.' },
            { text: 'Type <b>*cycle*</b> in the Name field. Run Filter In Place. All entries with "cycle" in the vendor name appear.' },
            { text: 'Run Filter In Place again. Type <b>> 12/31/2017</b> in the Due Date field.' },
            { text: 'Run Filter In Place. All entries with a due date after 12/31/17 display.' },
            { text: 'Close the Purchase Order Lines form.' },
          ]},
        ]
      },
      {
        id: '2.2b', title: 'Use a query',
        goal: 'Use the Item Stockroom Locations query form to filter with primary and additional criteria, then save the query.',
        parts: [
          { title: 'Part 1 – Enter primary criteria', steps: [
            { text: 'Open the <b>Item Stockroom Locations</b> form. Run Filter In Place.' },
            { text: 'Click <b>Actions › Filter › By Query</b>. The query form opens on the Primary Criteria tab.' },
            { text: 'Set <b>Warehouse = MAIN-Progressive Industries</b>.' },
            { text: 'Set <b>Item LIKE bk*</b> (operator: like, value: bk*).' },
            { text: 'Set <b>Rank &lt; 3</b>.' },
            { text: 'Click <b>Refresh</b> to preview results in the Results pane.' },
          ]},
          { title: 'Part 2 – Enter additional criteria', steps: [
            { text: 'Click the <b>Additional Criteria</b> tab.' },
            { text: 'Select <b>Warehouse On Hand</b> as the field, <b>&lt;</b> as the operator, and type <b>5</b> as the value.' },
            { text: 'Make sure the "OR instead of AND" check box is NOT selected. Click <b>Add</b>.' },
            { text: 'Click <b>Refresh</b>. The record with On Hand = 5 no longer appears.' },
          ]},
          { title: 'Part 3 – Save the query', steps: [
            { text: 'Click <b>Actions › Filter › Save</b>. Type <b>My Query</b> in the Name field. Click <b>OK</b>.' },
            { text: 'Click <b>OK</b> again to return results to the Item Stockroom Locations form.' },
            { text: 'Close the form.' },

      },
      {
        id: '2.3', title: 'Adjust grid columns',

          { title: 'Part 1 – Hide columns', steps: [
            { text: 'Open the <b>Items</b> form. Run Filter In Place.' },
            { text: 'Press <b>Ctrl+Shift+2</b> to switch to grid view.' },
            { text: 'Right-click a column header → <b>Edit Grid Columns</b>.' },
            { text: 'Clear the <b>Visible</b> checkbox for <b>Revision</b>, <b>Revision Track</b>, and <b>ECN</b>. Click <b>OK</b>.' },

// ── State ──────────────────────────────────────────────────────
function loadState() {
  try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { return {}; }
}
function saveState(s) { localStorage.setItem(KEY, JSON.stringify(s)); }

let state = loadState();

// ── Flatten all steps ──────────────────────────────────────────
function allStepIds() {
  const ids = [];
  LESSONS.forEach(l => l.exercises.forEach(ex => {
    ex.parts.forEach((pt, pi) => pt.steps.forEach((_, si) => ids.push(`${ex.id}-p${pi}-s${si}`)));
  }));
  return ids;
}

function updateProgress() {
  const ids = allStepIds();
  const done = ids.filter(id => state[id]).length;
  const pct = ids.length ? Math.round((done / ids.length) * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${done} / ${ids.length} steps complete`;
}

function countExDone(ex) {
  let total = 0, done = 0;
  ex.parts.forEach((pt, pi) => pt.steps.forEach((_, si) => {
    total++;
    if (state[`${ex.id}-p${pi}-s${si}`]) done++;
  }));
  return { total, done };
}

function updateExHead(exId) {
  const head = document.querySelector(`.ex-head[data-ex="${exId}"]`);
  if (!head) return;
  const ex = LESSONS.flatMap(l => l.exercises).find(e => e.id === exId);
  const { total, done } = countExDone(ex);
  const pct = total ? Math.round((done / total) * 100) : 0;
  head.querySelector('.ex-pct').textContent = `${pct}%`;
  if (done === total && total > 0) head.classList.add('done');
  else head.classList.remove('done');
}

function updateLessonHead(lessonId) {
  const lesson = LESSONS.find(l => l.id === lessonId);
  const btn = document.querySelector(`.lesson-btn[data-lesson="${lessonId}"]`);
  if (!btn || !lesson) return;
  let total = 0, done = 0;
  lesson.exercises.forEach(ex => {
    const c = countExDone(ex); total += c.total; done += c.done;
  });
  btn.querySelector('.l-check').textContent = `${done}/${total}`;
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  const page = document.getElementById('page');
  page.innerHTML = '';

  LESSONS.forEach(lesson => {
    const lDiv = document.createElement('div');
    lDiv.className = 'lesson';

    const btn = document.createElement('button');
    btn.className = 'lesson-btn open';
    btn.dataset.lesson = lesson.id;
    btn.innerHTML = `
      <span class="l-badge">${lesson.label}</span>
      <span>${lesson.title}</span>
      <span class="l-check"></span>
      <span class="l-caret">▶</span>`;
    btn.addEventListener('click', () => {
      btn.classList.toggle('open');
      body.classList.toggle('open');
    });

    const body = document.createElement('div');
    body.className = 'lesson-body open';

    lesson.exercises.forEach(ex => {
      const card = document.createElement('div');
      card.className = 'ex-card';

      const head = document.createElement('div');
      head.className = 'ex-head';
      head.dataset.ex = ex.id;
      head.innerHTML = `
        <span class="ex-num">Ex ${ex.id}</span>
        <div>
          <div class="ex-title">${ex.title}</div>
          <div class="ex-meta">${ex.parts.reduce((acc, p) => acc + p.steps.length, 0)} steps</div>
        </div>
        <div class="ex-progress">
          <div class="ex-pct">0%</div>
          <div class="ex-done-badge">✓ Done</div>
        </div>`;

      const exBody = document.createElement('div');
      exBody.className = 'ex-body open';

      const goal = document.createElement('div');
      goal.className = 'ex-goal';
      goal.textContent = ex.goal;
      exBody.appendChild(goal);

      ex.parts.forEach((part, pi) => {
        if (part.title !== 'Steps') {
          const pt = document.createElement('div');
          pt.className = 'part-title';
          pt.textContent = part.title;
          exBody.appendChild(pt);
        }

        const ul = document.createElement('ul');
        ul.className = 'step-list';

        part.steps.forEach((step, si) => {
          const id = `${ex.id}-p${pi}-s${si}`;
          const li = document.createElement('li');
          li.className = 'step-item' + (state[id] ? ' checked' : '');

          const cb = document.createElement('div');
          cb.className = 'step-cb';

          const txt = document.createElement('div');
          txt.className = 'step-text';
          txt.innerHTML = step.text;
          if (step.note) txt.innerHTML += `<span class="step-note">${step.note}</span>`;

          li.appendChild(cb);
          li.appendChild(txt);
          li.addEventListener('click', () => {
            const wasChecked = state[id];
            state[id] = !wasChecked;
            saveState(state);
            li.classList.toggle('checked', state[id]);
            updateExHead(ex.id);
            updateLessonHead(lesson.id);
            updateProgress();
          });

          ul.appendChild(li);
        });

        exBody.appendChild(ul);
      });

      const controls = document.createElement('div');
      controls.className = 'ex-controls';
      const resetBtn = document.createElement('button');
      resetBtn.className = 'btn btn-reset';
      resetBtn.textContent = 'Reset';
      resetBtn.addEventListener('click', e => {
        e.stopPropagation();
        ex.parts.forEach((pt, pi) => pt.steps.forEach((_, si) => { delete state[`${ex.id}-p${pi}-s${si}`]; }));
        saveState(state);
        renderExSteps(exBody, ex);
        updateExHead(ex.id);
        updateLessonHead(lesson.id);
        updateProgress();
      });
      const allBtn = document.createElement('button');
      allBtn.className = 'btn btn-all';
      allBtn.textContent = 'Mark all done';
      allBtn.addEventListener('click', e => {
        e.stopPropagation();
        ex.parts.forEach((pt, pi) => pt.steps.forEach((_, si) => { state[`${ex.id}-p${pi}-s${si}`] = true; }));
        saveState(state);
        renderExSteps(exBody, ex);
        updateExHead(ex.id);
        updateLessonHead(lesson.id);
        updateProgress();
      });
      controls.appendChild(resetBtn);
      controls.appendChild(allBtn);
      exBody.appendChild(controls);

      head.addEventListener('click', () => exBody.classList.toggle('open'));

      card.appendChild(head);
      card.appendChild(exBody);
      body.appendChild(card);
    });

    lDiv.appendChild(btn);
    lDiv.appendChild(body);
    page.appendChild(lDiv);

    lesson.exercises.forEach(ex => updateExHead(ex.id));
    updateLessonHead(lesson.id);
  });

  updateProgress();
}

function renderExSteps(exBody, ex) {
  exBody.querySelectorAll('.step-item').forEach((li, idx) => {
    let globalIdx = 0;
    let found = false;
    ex.parts.forEach((pt, pi) => {
      if (found) return;
      pt.steps.forEach((_, si) => {
        if (!found && globalIdx === idx) {
          const id = `${ex.id}-p${pi}-s${si}`;
          li.classList.toggle('checked', !!state[id]);
          found = true;
        }
        globalIdx++;
      });
    });
  });
}

render();
</script>
